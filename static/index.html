<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grand Luxe Hotel</title>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --gold-dark:  #9a7530;
      --dark:       #0d0d0d;
      --dark-2:     #1a1a1a;
      --dark-3:     #252525;
      --dark-4:     #2f2f2f;
      --cream:      #f5f0e8;
      --cream-dim:  #d4cbbf;
      --green:      #2e7d52;
      --green-light:#3fa370;
      --red:        #8b2020;
      --red-light:  #b84040;
      --amber:      #8b6020;
      --amber-light:#c48030;
      --radius:     12px;
      --shadow:     0 8px 32px rgba(0,0,0,0.6);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #000 0%, var(--dark-2) 100%);
      border-bottom: 1px solid var(--gold-dark);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(201,168,76,0.4);
    }
    .logo-text h1 {
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: normal;
    }
    .logo-text p {
      font-size: 0.65rem;
      letter-spacing: 6px;
      color: var(--cream-dim);
      text-transform: uppercase;
    }
    .header-time {
      font-size: 0.85rem;
      color: var(--cream-dim);
      letter-spacing: 1px;
    }

    /* ── Main Layout ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .stat-card {
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border: 1px solid var(--dark-4);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      cursor: default;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.gold { border-color: var(--gold-dark); }
    .stat-card.gold::before { background: linear-gradient(135deg, rgba(201,168,76,0.06), transparent); }
    .stat-card.green { border-color: var(--green); }
    .stat-card.green::before { background: linear-gradient(135deg, rgba(46,125,82,0.08), transparent); }
    .stat-card.red { border-color: var(--red-light); }
    .stat-card.red::before { background: linear-gradient(135deg, rgba(139,32,32,0.08), transparent); }
    .stat-card.amber { border-color: var(--amber-light); }
    .stat-card.amber::before { background: linear-gradient(135deg, rgba(139,96,32,0.08), transparent); }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 2.4rem;
      font-weight: bold;
      line-height: 1;
      transition: var(--transition);
    }
    .stat-card.gold .stat-value { color: var(--gold); }
    .stat-card.green .stat-value { color: var(--green-light); }
    .stat-card.red .stat-value { color: var(--red-light); }
    .stat-card.amber .stat-value { color: var(--amber-light); }
    .stat-sublabel { font-size: 0.72rem; color: var(--cream-dim); margin-top: 0.3rem; }

    /* ── Section Headers ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .section-title {
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: var(--gold);
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 99px;
      border: 1px solid var(--dark-4);
      background: var(--dark-3);
      color: var(--cream-dim);
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
    }
    .filter-btn:hover { border-color: var(--gold-dark); color: var(--gold); }
    .filter-btn.active {
      background: var(--gold-dark);
      border-color: var(--gold);
      color: var(--dark);
      font-weight: bold;
    }

    /* ── Add Room Form ── */
    .form-card {
      background: linear-gradient(135deg, var(--dark-2), var(--dark-3));
      border: 1px solid var(--gold-dark);
      border-radius: var(--radius);
      padding: 1.8rem;
      margin-bottom: 2.5rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--dark-4);
      border: 1px solid #444;
      border-radius: 8px;
      color: var(--cream);
      font-family: inherit;
      font-size: 0.9rem;
      transition: var(--transition);
      outline: none;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .form-group select option { background: var(--dark-3); }

    /* ── Buttons ── */
    .btn {
      padding: 0.7rem 1.8rem;
      border-radius: 8px;
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      font-weight: bold;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--dark);
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.45); }
    .btn-gold:active { transform: translateY(0); }

    /* ── Rooms Grid ── */
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    /* ── Room Card ── */
    .room-card {
      background: linear-gradient(145deg, var(--dark-2), var(--dark-3));
      border-radius: var(--radius);
      padding: 1.6rem;
      border: 1px solid var(--dark-4);
      transition: var(--transition);
      animation: fadeInUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .room-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .room-card.disponible::after { background: linear-gradient(90deg, var(--green), var(--green-light)); }
    .room-card.ocupada::after { background: linear-gradient(90deg, var(--red), var(--red-light)); }
    .room-card.mantenimiento::after { background: linear-gradient(90deg, var(--amber), var(--amber-light)); }

    .room-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: #3a3a3a;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .room-number {
      font-size: 2rem;
      color: var(--gold);
      line-height: 1;
      font-weight: bold;
    }
    .room-number span {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cream-dim);
      display: block;
      margin-top: 2px;
    }

    .status-badge {
      padding: 0.3rem 0.85rem;
      border-radius: 99px;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .badge-disponible { background: rgba(46,125,82,0.2); color: var(--green-light); border: 1px solid var(--green); }
    .badge-ocupada    { background: rgba(139,32,32,0.2); color: var(--red-light);   border: 1px solid var(--red-light); }
    .badge-mantenimiento { background: rgba(139,96,32,0.2); color: var(--amber-light); border: 1px solid var(--amber-light); }

    .room-type {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 0.5rem;
    }
    .room-price {
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 0.3rem;
    }
    .room-price span { font-size: 0.7rem; color: var(--cream-dim); }
    .room-guest {
      font-size: 0.8rem;
      color: var(--cream-dim);
      margin: 0.6rem 0;
      font-style: italic;
      min-height: 1.2em;
    }

    .room-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
      font-weight: bold;
    }
    .btn-reserve {
      background: rgba(46,125,82,0.15);
      color: var(--green-light);
      border-color: var(--green);
    }
    .btn-reserve:hover { background: rgba(46,125,82,0.35); }
    .btn-release {
      background: rgba(201,168,76,0.12);
      color: var(--gold-light);
      border-color: var(--gold-dark);
    }
    .btn-release:hover { background: rgba(201,168,76,0.28); }
    .btn-maint {
      background: rgba(139,96,32,0.12);
      color: var(--amber-light);
      border-color: var(--amber);
    }
    .btn-maint:hover { background: rgba(139,96,32,0.28); }
    .btn-delete {
      background: rgba(139,32,32,0.12);
      color: var(--red-light);
      border-color: var(--red-light);
      margin-left: auto;
    }
    .btn-delete:hover { background: rgba(139,32,32,0.3); }
    .btn-sm:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--cream-dim);
      border: 1px dashed var(--dark-4);
      border-radius: var(--radius);
    }
    .empty-state p { font-size: 0.85rem; letter-spacing: 2px; margin-top: 0.5rem; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--dark-2);
      border: 1px solid var(--gold-dark);
      border-radius: var(--radius);
      padding: 2.2rem;
      width: min(420px, 90vw);
      transform: scale(0.92);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal h3 {
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .modal .form-group { margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-cancel {
      background: var(--dark-4); color: var(--cream-dim);
      border: 1px solid #444; padding: 0.6rem 1.2rem;
      border-radius: 8px; font-family: inherit;
      font-size: 0.8rem; cursor: pointer; transition: var(--transition);
    }
    .btn-cancel:hover { border-color: var(--cream-dim); }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 2rem; right: 2rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      z-index: 300;
    }
    .toast {
      background: var(--dark-3);
      border-left: 3px solid var(--gold);
      padding: 0.9rem 1.3rem;
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--cream);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      animation: slideIn 0.3s ease;
      max-width: 300px;
    }
    .toast.success { border-color: var(--green-light); }
    .toast.error   { border-color: var(--red-light); }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .loading { animation: pulse 1.5s infinite; }

    /* ── Divider ── */
    .gold-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
      margin: 2.5rem 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">♦</div>
      <div class="logo-text">
        <h1>Grand Luxe</h1>
        <p>Hotel Management System</p>
      </div>
    </div>
    <div class="header-time" id="clock">—</div>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card gold">
      <div class="stat-label">Total habitaciones</div>
      <div class="stat-value loading" id="statTotal">—</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Disponibles</div>
      <div class="stat-value loading" id="statAvailable">—</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Ocupadas</div>
      <div class="stat-value loading" id="statOccupied">—</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Mantenimiento</div>
      <div class="stat-value loading" id="statMaint">—</div>
    </div>
    <div class="stat-card gold" style="border-color: var(--gold);">
      <div class="stat-label">Ingresos estimados</div>
      <div class="stat-value loading" id="statRevenue" style="font-size:1.7rem;">—</div>
      <div class="stat-sublabel">por noche</div>
    </div>
  </div>

  <!-- Add room -->
  <div class="section-header">
    <div class="section-title">Nueva habitación</div>
  </div>
  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Número</label>
        <input type="text" id="inpNumber" placeholder="Ej: 502" maxlength="10"/>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="inpType">
          <option value="individual">Individual</option>
          <option value="doble">Doble</option>
          <option value="suite">Suite</option>
        </select>
      </div>
      <div class="form-group">
        <label>Precio por noche (€)</label>
        <input type="number" id="inpPrice" placeholder="Ej: 350" min="1" step="0.01"/>
      </div>
    </div>
    <button class="btn btn-gold" onclick="createRoom()">+ Añadir habitación</button>
  </div>

  <div class="gold-divider"></div>

  <!-- Room list -->
  <div class="section-header">
    <div class="section-title">Habitaciones</div>
    <div class="filters">
      <button class="filter-btn active" data-filter="" onclick="setFilter(this, '')">Todas</button>
      <button class="filter-btn" data-filter="disponible" onclick="setFilter(this, 'disponible')">Disponibles</button>
      <button class="filter-btn" data-filter="ocupada" onclick="setFilter(this, 'ocupada')">Ocupadas</button>
      <button class="filter-btn" data-filter="mantenimiento" onclick="setFilter(this, 'mantenimiento')">Mantenimiento</button>
    </div>
  </div>
  <div class="rooms-grid" id="roomsGrid">
    <div class="empty-state loading">
      <div style="font-size:2rem;">⌛</div>
      <p>Cargando habitaciones...</p>
    </div>
  </div>

</main>

<!-- Reserve Modal -->
<div class="modal-overlay" id="reserveModal">
  <div class="modal">
    <h3>Reservar habitación</h3>
    <div class="form-group">
      <label>Nombre del huésped</label>
      <input type="text" id="guestNameInput" placeholder="Nombre completo" maxlength="80"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="confirmReserve()">Confirmar reserva</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const API = '';
  let currentFilter = '';
  let pendingReserveId = null;

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('es-ES', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    }) + ' · ' + now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Toast ──
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ── API helpers ──
  async function apiFetch(path, options = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...options
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Error desconocido' }));
      throw new Error(err.detail || 'Error');
    }
    if (res.status === 204) return null;
    return res.json();
  }

  // ── Stats ──
  async function loadStats() {
    try {
      const s = await apiFetch('/api/stats');
      animateValue('statTotal', s.total);
      animateValue('statAvailable', s.available);
      animateValue('statOccupied', s.occupied);
      animateValue('statMaint', s.maintenance);
      document.getElementById('statRevenue').textContent =
        '€ ' + s.estimated_revenue.toLocaleString('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      document.getElementById('statRevenue').classList.remove('loading');
    } catch (e) { /* silent */ }
  }

  function animateValue(id, target) {
    const el = document.getElementById(id);
    el.classList.remove('loading');
    const start = parseInt(el.textContent) || 0;
    const diff = target - start;
    const steps = 20;
    let step = 0;
    const timer = setInterval(() => {
      step++;
      el.textContent = Math.round(start + diff * (step / steps));
      if (step >= steps) { el.textContent = target; clearInterval(timer); }
    }, 20);
  }

  // ── Rooms ──
  async function loadRooms() {
    const url = currentFilter ? `/api/rooms?status=${currentFilter}` : '/api/rooms';
    try {
      const rooms = await apiFetch(url);
      renderRooms(rooms);
    } catch (e) {
      toast('Error al cargar habitaciones', 'error');
    }
  }

  function typeIcon(type) {
    return { suite: '♦', doble: '◈', individual: '◇' }[type] || '◇';
  }
  function typeLabel(type) {
    return { suite: 'Suite', doble: 'Doble', individual: 'Individual' }[type] || type;
  }

  function renderRooms(rooms) {
    const grid = document.getElementById('roomsGrid');
    if (!rooms.length) {
      grid.innerHTML = `<div class="empty-state">
        <div style="font-size:2rem; opacity:0.4;">🚪</div>
        <p>No hay habitaciones con este filtro</p>
      </div>`;
      return;
    }
    grid.innerHTML = rooms.map((r, i) => `
      <div class="room-card ${r.status}" style="animation-delay:${i * 0.05}s">
        <div class="room-header">
          <div class="room-number">
            ${r.number}
            <span>${typeIcon(r.type)} ${typeLabel(r.type)}</span>
          </div>
          <span class="status-badge badge-${r.status}">${r.status}</span>
        </div>
        <div class="room-price">€ ${r.price_per_night.toLocaleString('es-ES', {minimumFractionDigits: 0})} <span>/ noche</span></div>
        <div class="room-guest">${r.guest_name ? '👤 ' + r.guest_name : ''}</div>
        <div class="room-actions">
          <button class="btn-sm btn-reserve"
            onclick="openReserve(${r.id})"
            ${r.status !== 'disponible' ? 'disabled' : ''}>Reservar</button>
          <button class="btn-sm btn-release"
            onclick="releaseRoom(${r.id})"
            ${r.status !== 'ocupada' ? 'disabled' : ''}>Liberar</button>
          <button class="btn-sm btn-maint"
            onclick="maintRoom(${r.id})"
            ${r.status === 'mantenimiento' ? 'disabled' : ''}>Mantenimiento</button>
          <button class="btn-sm btn-delete"
            onclick="deleteRoom(${r.id}, '${r.number}')">✕</button>
        </div>
      </div>
    `).join('');
  }

  // ── Actions ──
  async function createRoom() {
    const number = document.getElementById('inpNumber').value.trim();
    const type   = document.getElementById('inpType').value;
    const price  = parseFloat(document.getElementById('inpPrice').value);

    if (!number) return toast('Introduce el número de habitación', 'error');
    if (!price || price <= 0) return toast('El precio debe ser mayor a 0', 'error');

    try {
      await apiFetch('/api/rooms', {
        method: 'POST',
        body: JSON.stringify({ number, type, price_per_night: price })
      });
      document.getElementById('inpNumber').value = '';
      document.getElementById('inpPrice').value  = '';
      toast(`Habitación ${number} creada`, 'success');
      refresh();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  function openReserve(id) {
    pendingReserveId = id;
    document.getElementById('guestNameInput').value = '';
    document.getElementById('reserveModal').classList.add('open');
    setTimeout(() => document.getElementById('guestNameInput').focus(), 150);
  }
  function closeModal() {
    document.getElementById('reserveModal').classList.remove('open');
    pendingReserveId = null;
  }
  document.getElementById('reserveModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('guestNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmReserve();
  });

  async function confirmReserve() {
    const name = document.getElementById('guestNameInput').value.trim();
    if (!name) return toast('Introduce el nombre del huésped', 'error');
    try {
      await apiFetch(`/api/rooms/${pendingReserveId}/reserve`, {
        method: 'PATCH',
        body: JSON.stringify({ guest_name: name })
      });
      toast(`Habitación reservada para ${name}`, 'success');
      closeModal();
      refresh();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  async function releaseRoom(id) {
    try {
      await apiFetch(`/api/rooms/${id}/release`, { method: 'PATCH' });
      toast('Habitación liberada', 'success');
      refresh();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function maintRoom(id) {
    try {
      await apiFetch(`/api/rooms/${id}/maintenance`, { method: 'PATCH' });
      toast('Habitación en mantenimiento', 'success');
      refresh();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function deleteRoom(id, number) {
    if (!confirm(`¿Eliminar habitación ${number}?`)) return;
    try {
      await apiFetch(`/api/rooms/${id}`, { method: 'DELETE' });
      toast(`Habitación ${number} eliminada`, 'success');
      refresh();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ── Filter ──
  function setFilter(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadRooms();
  }

  // ── Refresh all ──
  function refresh() {
    loadRooms();
    loadStats();
  }

  // ── Init ──
  refresh();
  setInterval(refresh, 30000); // auto-refresh every 30s
</script>
</body>
</html>
